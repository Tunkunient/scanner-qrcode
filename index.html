<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Scanner + Generator</title>

    <style>
        /* ============================================================
                   ALL STYLES IN ONE PLACE
                   ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            margin: 0;
        }

        .container {
            max-width: 520px;
            width: 100%;
            text-align: center;
        }

        /* HEADER */
        h1 {
            font-size: 2rem;
            margin-bottom: 4px;
            background: linear-gradient(135deg, #66ea7c 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        /* ===== TABS ===== */
        .tabs {
            display: flex;
            gap: 8px;
            background: #1a1a1a;
            padding: 6px;
            border-radius: 14px;
            margin-bottom: 24px;
            border: 1px solid #2a2a2a;
        }

        .tab-btn {
            flex: 1;
            padding: 10px 0;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            background: transparent;
            color: #888;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .tab-btn:hover:not(.active) {
            color: #fff;
        }

        /* ===== PANELS ===== */
        .panel {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .panel.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== SCANNER PANEL (Your Original Code) ===== */
        .scanner-box {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 300px;
            margin: 0 auto 16px;
            background: #1a1a1a;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #placeholderText {
            color: #666;
            font-size: 0.9rem;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        #video.active {
            display: block;
        }

        #canvas {
            display: none;
        }

        /* OVERLAY (scanning frame) */
        #overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 180px;
            height: 180px;
            border: 2px solid #667eea;
            border-radius: 12px;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            display: none;
        }

        #overlay.active {
            display: block;
        }

        /* RESULT */
        #result {
            background: #1a1a1a;
            padding: 14px 16px;
            border-radius: 12px;
            min-height: 60px;
            margin-bottom: 16px;
            border: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-all;
        }

        #output {
            color: #aaa;
            font-size: 0.95rem;
        }

        #output.success {
            color: #4ade80;
        }

        #output.error {
            color: #f87171;
        }

        /* BUTTONS */
        .button-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 28px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, opacity 0.2s;
        }

        button:active {
            transform: scale(0.95);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }

        .btn-secondary {
            background: #2a2a2a;
            color: #fff;
        }

        .btn-secondary:hover {
            background: #333;
        }

        .btn-success {
            background: #22c55e;
            color: #fff;
        }

        .btn-success:hover {
            background: #16a34a;
        }

        .btn-danger {
            background: #dc2626;
            color: #fff;
        }

        /* STATUS */
        .status {
            margin-top: 12px;
            font-size: 0.85rem;
            color: #666;
            min-height: 20px;
        }

        /* FLASHLIGHT BUTTON */
        #flashlightBtn {
            display: none;
        }

        #flashlightBtn.visible {
            display: inline-block;
        }

        /* ===== GENERATOR PANEL ===== */
        .generator-box {
            background: #1a1a1a;
            padding: 24px;
            border-radius: 16px;
            border: 2px solid #333;
            margin-bottom: 16px;
        }

        .form-group {
            margin-bottom: 16px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .form-group input[type="text"],
        .form-group input[type="url"] {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid #333;
            background: #0a0a0a;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border 0.2s;
        }

        .form-group input:focus {
            border-color: #667eea;
        }

        .color-row {
            display: flex;
            gap: 16px;
        }

        .color-row .form-group {
            flex: 1;
        }

        .form-group input[type="color"] {
            width: 100%;
            height: 48px;
            padding: 4px;
            border-radius: 10px;
            border: 1px solid #333;
            background: #0a0a0a;
            cursor: pointer;
        }

        #qrcode-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 200px;
            background: #0a0a0a;
            border-radius: 12px;
            border: 1px dashed #333;
            padding: 20px;
            margin-top: 16px;
        }

        #qrcode-container canvas,
        #qrcode-container img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }

        .gen-buttons {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* RESPONSIVE */
        @media (max-width: 480px) {
            h1 {
                font-size: 1.5rem;
            }
            .scanner-box {
                height: 240px;
            }
            #overlay {
                width: 140px;
                height: 140px;
            }
            button {
                padding: 10px 18px;
                font-size: 0.9rem;
            }
            .color-row {
                flex-direction: column;
                gap: 0;
            }
            .generator-box {
                padding: 16px;
            }
        }

        /* COPY BUTTON */
        .copy-btn {
            background: transparent;
            border: 1px solid #444;
            color: #aaa;
            padding: 4px 12px;
            font-size: 0.75rem;
            border-radius: 6px;
            margin-left: 8px;
            cursor: pointer;
        }

        .copy-btn:hover {
            background: #2a2a2a;
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📷 QR Toolkit</h1>
        <p class="subtitle">Scan · Generate · Download</p>

        <!-- ===== TABS ===== -->
        <div class="tabs">
            <button id="tabScanner" class="tab-btn active">📷 Scanner</button>
            <button id="tabGenerator" class="tab-btn">✨ Generator</button>
        </div>

        <!-- ============================================================
        PANEL 1: SCANNER (Your exact original code)
        ============================================================ -->
        <div id="panelScanner" class="panel active">
            <!-- Scanner Box -->
            <div class="scanner-box">
                <span id="placeholderText">📸 Camera Preview Here</span>
                <video id="video" playsinline></video>
                <canvas id="canvas"></canvas>
                <div id="overlay"></div>
            </div>

            <!-- Result Display -->
            <div id="result">
                <span id="output">Ready to scan...</span>
            </div>

            <!-- Buttons -->
            <div class="button-group">
                <button id="scanBtn" class="btn-primary">▶ Start Scan</button>
                <button id="uploadBtn" class="btn-secondary">📁 Upload</button>
                <button id="flashlightBtn" class="btn-secondary">🔦 Flash</button>
            </div>

            <!-- Hidden file input -->
            <input type="file" id="fileInput" accept="image/*" style="display:none;" />

            <!-- Status -->
            <p id="status" class="status">✅ Ready. Click "Start Scan" to begin.</p>
        </div>

        <!-- ============================================================
        PANEL 2: GENERATOR (NEW)
        ============================================================ -->
        <div id="panelGenerator" class="panel">
            <div class="generator-box">
                <div class="form-group">
                    <label for="qrInput">📝 Enter text or URL</label>
                    <input type="text" id="qrInput" placeholder="https://example.com or Hello World!" value="https://example.com" />
                </div>

                <div class="color-row">
                    <div class="form-group">
                        <label for="fgColor">🎨 Dot Color</label>
                        <input type="color" id="fgColor" value="#000000" />
                    </div>
                    <div class="form-group">
                        <label for="bgColor">⬜ Background</label>
                        <input type="color" id="bgColor" value="#ffffff" />
                    </div>
                </div>

                <button id="generateBtn" class="btn-primary" style="width:100%;">⚡ Generate QR Code</button>

                <div id="qrcode-container">
                    <span style="color: #666; font-size: 0.9rem;">✨ Your QR code will appear here</span>
                </div>

                <div class="gen-buttons">
                    <button id="downloadBtn" class="btn-success" disabled>⬇️ Download PNG</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================================
    LIBRARIES
    ============================================================ -->
    <!-- jsQR for scanning -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js">
    </script>
    <!-- qrcodejs for generating -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js">
    </script>

    <!-- ============================================================
    MAIN APP SCRIPT
    ============================================================ -->
    <script>
        // ============================================================
        // 0. TAB SWITCHING
        // ============================================================

        const tabScanner = document.getElementById('tabScanner');
        const tabGenerator = document.getElementById('tabGenerator');
        const panelScanner = document.getElementById('panelScanner');
        const panelGenerator = document.getElementById('panelGenerator');

        let qrCodeInstance = null; // for generator

        function switchTab(tab) {
            // Hide all panels
            panelScanner.classList.remove('active');
            panelGenerator.classList.remove('active');
            tabScanner.classList.remove('active');
            tabGenerator.classList.remove('active');

            if (tab === 'scanner') {
                panelScanner.classList.add('active');
                tabScanner.classList.add('active');
                // Stop generator if running (nothing to stop)
            } else {
                panelGenerator.classList.add('active');
                tabGenerator.classList.add('active');
                // Stop camera to save battery
                if (isScanning) {
                    stopCamera();
                }
                // Auto-generate a default QR
                if (!qrCodeInstance) {
                    generateQR();
                }
            }
        }

        tabScanner.addEventListener('click', () => switchTab('scanner'));
        tabGenerator.addEventListener('click', () => switchTab('generator'));

        // ============================================================
        // 1. SCANNER (Your exact original code, with one fix: video.play())
        // ============================================================

        console.log('🚀 QR Code Scanner loading...');

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const output = document.getElementById('output');
        const statusEl = document.getElementById('status');
        const scanBtn = document.getElementById('scanBtn');
        const uploadBtn = document.getElementById('uploadBtn');
        const fileInput = document.getElementById('fileInput');
        const overlay = document.getElementById('overlay');
        const placeholderText = document.getElementById('placeholderText');
        const flashlightBtn = document.getElementById('flashlightBtn');

        let isScanning = false;
        let stream = null;
        let scanLoopId = null;
        let flashlightOn = false;

        async function startCamera() {
            try {
                statusEl.textContent = '⏳ Requesting camera...';
                output.textContent = '🔍 Requesting camera...';
                output.className = '';

                stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'environment',
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    }
                });

                video.srcObject = stream;
                video.classList.add('active');
                placeholderText.style.display = 'none';
                overlay.classList.add('active');

                // ⭐ FIX: Start the live feed!
                await video.play();

                // Show flashlight button
                flashlightBtn.classList.add('visible');

                isScanning = true;
                scanBtn.textContent = '⏹ Stop';
                statusEl.textContent = '📸 Camera active. Scanning...';
                output.textContent = '🔍 Looking for QR code...';
                output.className = '';

                scanLoop();

            } catch (err) {
                console.error('Camera error:', err);
                statusEl.textContent = '❌ Camera unavailable. Use Upload Image.';
                output.textContent = '⚠️ Camera access denied. Please allow camera or upload an image.';
                output.className = 'error';
                scanBtn.textContent = '▶ Start Scan';
                scanBtn.disabled = false;
                flashlightBtn.classList.remove('visible');
            }
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            video.srcObject = null;
            video.classList.remove('active');
            placeholderText.style.display = 'block';
            overlay.classList.remove('active');
            flashlightBtn.classList.remove('visible');
            flashlightOn = false;
            flashlightBtn.textContent = '🔦 Flash';
            isScanning = false;
            scanBtn.textContent = '▶ Start Scan';
            statusEl.textContent = '⏹ Stopped.';
            output.textContent = 'Ready to scan...';
            output.className = '';
            if (scanLoopId) {
                cancelAnimationFrame(scanLoopId);
                scanLoopId = null;
            }
        }

        function scanLoop() {
            if (!isScanning) {
                scanLoopId = null;
                return;
            }

            if (video.readyState === video.HAVE_ENOUGH_DATA && video.videoWidth > 0) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0);

                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

                try {
                    const code = jsQR(imageData.data, imageData.width, imageData.height, {
                        inversionAttempts: 'dontInvert',
                    });

                    if (code && code.data) {
                        handleQRResult(code.data);
                    }
                } catch (e) {
                    // Silent fail
                }
            }

            scanLoopId = requestAnimationFrame(scanLoop);
        }

        function handleQRResult(data) {
            output.textContent = '✅ ' + data;
            output.className = 'success';
            statusEl.textContent = '🎯 QR code detected!';
            if (navigator.vibrate) navigator.vibrate(100);
        }

        // Upload
        function handleFileUpload(file) {
            if (!file || !file.type.startsWith('image/')) {
                output.textContent = '❌ Please select an image file.';
                output.className = 'error';
                return;
            }

            statusEl.textContent = '⏳ Processing image...';
            output.textContent = '⏳ Reading image...';
            output.className = '';

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

                    try {
                        const code = jsQR(imageData.data, imageData.width, imageData.height, {
                            inversionAttempts: 'dontInvert',
                        });
                        if (code && code.data) {
                            output.textContent = '✅ ' + code.data;
                            output.className = 'success';
                            statusEl.textContent = '🎯 QR code found in image!';
                            if (navigator.vibrate) navigator.vibrate(100);
                        } else {
                            output.textContent = '❌ No QR code found in this image.';
                            output.className = 'error';
                            statusEl.textContent = '😕 Try a clearer image.';
                        }
                    } catch (err) {
                        output.textContent = '❌ Error reading image.';
                        output.className = 'error';
                        statusEl.textContent = '⚠️ ' + err.message;
                    }
                };
                img.onerror = function() {
                    output.textContent = '❌ Failed to load image.';
                    output.className = 'error';
                    statusEl.textContent = '⚠️ Image could not be loaded.';
                };
                img.src = e.target.result;
            };
            reader.onerror = function() {
                output.textContent = '❌ Failed to read file.';
                output.className = 'error';
                statusEl.textContent = '⚠️ File could not be read.';
            };
            reader.readAsDataURL(file);
        }

        // Flashlight
        async function toggleFlashlight() {
            if (!stream) {
                statusEl.textContent = '⚠️ Please start camera first.';
                return;
            }
            try {
                const track = stream.getVideoTracks()[0];
                if (!track) {
                    statusEl.textContent = '⚠️ No video track found.';
                    return;
                }
                let torchSupported = false;
                try {
                    const caps = track.getCapabilities();
                    if (caps && caps.torch) torchSupported = true;
                } catch (e) {}

                if (!torchSupported) {
                    statusEl.textContent = '⚠️ Flashlight not supported.';
                    return;
                }
                flashlightOn = !flashlightOn;
                await track.applyConstraints({
                    advanced: [{ torch: flashlightOn }]
                });
                flashlightBtn.textContent = flashlightOn ? '🔦 On' : '🔦 Off';
                statusEl.textContent = flashlightOn ? '💡 Flashlight ON' : '💡 Flashlight OFF';
            } catch (err) {
                console.error('Flashlight error:', err);
                statusEl.textContent = '⚠️ Could not toggle flashlight.';
                flashlightOn = false;
                flashlightBtn.textContent = '🔦 Flash';
            }
        }

        // Copy button (unchanged)
        function addCopyButton() {
            const resultDiv = document.getElementById('result');
            const existingCopy = resultDiv.querySelector('.copy-btn');
            if (existingCopy) existingCopy.remove();
            const text = output.textContent;
            if (!text || text === 'Ready to scan...' || text.includes('❌') || text.includes('🔍')) return;
            const copyBtn = document.createElement('button');
            copyBtn.className = 'copy-btn';
            copyBtn.textContent = '📋 Copy';
            copyBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                const textToCopy = output.textContent.replace('✅ ', '');
                navigator.clipboard.writeText(textToCopy).then(() => {
                    copyBtn.textContent = '✅ Copied!';
                    setTimeout(() => { copyBtn.textContent = '📋 Copy'; }, 2000);
                }).catch(() => {
                    const range = document.createRange();
                    range.selectNode(output);
                    window.getSelection().removeAllRanges();
                    window.getSelection().addRange(range);
                    document.execCommand('copy');
                    copyBtn.textContent = '✅ Copied!';
                    setTimeout(() => { copyBtn.textContent = '📋 Copy'; }, 2000);
                });
            });
            resultDiv.appendChild(copyBtn);
        }

        const outputObserver = new MutationObserver(() => {
            if (output.textContent.startsWith('✅')) addCopyButton();
        });
        outputObserver.observe(output, { childList: true, characterData: true, subtree: true });

        // Scanner Event Listeners
        scanBtn.addEventListener('click', function() {
            if (isScanning) stopCamera();
            else startCamera();
        });

        uploadBtn.addEventListener('click', function() {
            fileInput.click();
        });

        fileInput.addEventListener('change', function(e) {
            if (e.target.files && e.target.files[0]) {
                if (isScanning) stopCamera();
                handleFileUpload(e.target.files[0]);
                fileInput.value = '';
            }
        });

        flashlightBtn.addEventListener('click', toggleFlashlight);

        document.addEventListener('keydown', function(e) {
            if (e.key === ' ' && e.target === document.body) {
                e.preventDefault();
                scanBtn.click();
            }
            if (e.key === 'o' && (e.ctrlKey || e.metaKey)) {
                e.preventDefault();
                uploadBtn.click();
            }
        });

        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            statusEl.textContent = '⚠️ Camera not supported. Use Upload.';
            output.textContent = '⚠️ Camera unavailable';
            output.className = 'error';
            scanBtn.disabled = true;
        }

        // Drag & Drop
        const container = document.querySelector('.container');
        container.addEventListener('dragover', function(e) {
            e.preventDefault();
            container.style.borderColor = '#667eea';
        });
        container.addEventListener('dragleave', function(e) {
            e.preventDefault();
            container.style.borderColor = 'transparent';
        });
        container.addEventListener('drop', function(e) {
            e.preventDefault();
            container.style.borderColor = 'transparent';
            const files = e.dataTransfer.files;
            if (files && files[0] && files[0].type.startsWith('image/')) {
                if (isScanning) stopCamera();
                handleFileUpload(files[0]);
            } else {
                output.textContent = '❌ Please drop an image file.';
                output.className = 'error';
            }
        });

        console.log('✅ QR Toolkit ready!');

        // ============================================================
        // 2. GENERATOR (NEW)
        // ============================================================

        const qrInput = document.getElementById('qrInput');
        const fgColor = document.getElementById('fgColor');
        const bgColor = document.getElementById('bgColor');
        const generateBtn = document.getElementById('generateBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const qrContainer = document.getElementById('qrcode-container');

        function generateQR() {
            const text = qrInput.value.trim();
            if (!text) {
                alert('Please enter some text or a URL.');
                return;
            }

            // Clear previous QR
            qrContainer.innerHTML = '';

            // Create a new QR code
            qrCodeInstance = new QRCode(qrContainer, {
                text: text,
                width: 256,
                height: 256,
                colorDark: fgColor.value,
                colorLight: bgColor.value,
                correctLevel: QRCode.CorrectLevel.H // High error correction (good for logos later)
            });

            // Enable download button
            downloadBtn.disabled = false;
            statusEl.textContent = '✅ QR code generated!';
        }

        function downloadQR() {
            const canvasEl = qrContainer.querySelector('canvas');
            if (!canvasEl) {
                alert('Generate a QR code first.');
                return;
            }

            // Create a high-res download (2x size)
            const link = document.createElement('a');
            link.download = `qrcode_${Date.now()}.png`;
            link.href = canvasEl.toDataURL('image/png');
            link.click();
            statusEl.textContent = '⬇️ QR code downloaded!';
        }

        // Generator Event Listeners
        generateBtn.addEventListener('click', generateQR);

        downloadBtn.addEventListener('click', downloadQR);

        // Auto-generate on Enter key in input
        qrInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                generateQR();
            }
        });

        // Auto-generate when colors change (optional, nice UX)
        fgColor.addEventListener('input', generateQR);
        bgColor.addEventListener('input', generateQR);

        // Generate initial QR code when the page loads (and generator tab is active)
        // We'll generate it the first time the generator tab is opened.
        // But since it's hidden, we generate it on first click.
        // Let's generate a default one now so it's ready.
        setTimeout(() => {
            // Only generate if generator panel is active, else wait.
            if (panelGenerator.classList.contains('active')) {
                generateQR();
            }
        }, 500);

        // Override tab switch to generate QR when switching to generator
        const originalSwitchTab = switchTab;
        switchTab = function(tab) {
            originalSwitchTab(tab);
            if (tab === 'generator') {
                // Generate QR if it doesn't exist or container is empty
                if (!qrContainer.querySelector('canvas') && !qrContainer.querySelector('img')) {
                    generateQR();
                } else if (qrCodeInstance) {
                    // Re-generate to apply current colors if needed
                    // But only if text is not empty
                    if (qrInput.value.trim()) {
                        generateQR();
                    }
                }
            }
        };

        // Re-bind the tab listeners to use the new switchTab
        tabScanner.removeEventListener('click', () => switchTab('scanner'));
        tabGenerator.removeEventListener('click', () => switchTab('generator'));
        tabScanner.addEventListener('click', () => switchTab('scanner'));
        tabGenerator.addEventListener('click', () => switchTab('generator'));

        // Fix initial state: if generator is active by default, generate.
        if (panelGenerator.classList.contains('active')) {
            setTimeout(generateQR, 100);
        }

        console.log('✨ Generator ready!');
    </script>

</body>
</html>
